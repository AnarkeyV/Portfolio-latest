---
- name: Deploy Portfolio Locally with Docker Compose
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Show deployment message
      ansible.builtin.debug:
        msg: "Deploying the Flask portfolio locally using Docker Compose."

    - name: Build and start Docker Compose services
      ansible.builtin.command:
        cmd: docker compose up -d --build
        chdir: "{{ playbook_dir }}/.."

    - name: Show running containers
      ansible.builtin.command:
        cmd: docker compose ps
        chdir: "{{ playbook_dir }}/.."
      register: compose_status

    - name: Display Docker Compose status
      ansible.builtin.debug:
        var: compose_status.stdout_lines