name: Portfolio CI Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate Flask Portfolio
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m py_compile flask_app.py

      - name: Build Docker image
        run: |
          docker build -t portfolio-latest:ci .

      - name: CI summary
        run: |
          echo "Portfolio CI check completed successfully."
          echo "This workflow validates the app and Docker build only."
          echo "No production deployment is performed."
